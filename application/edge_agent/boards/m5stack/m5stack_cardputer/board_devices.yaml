version: 1.0.0
# Devices Configuration for M5Stack Cardputer
# v2: WS2812 LED + ST7789V2 display + 56-key matrix (74HC138-decoded rows).
devices:

  - name: led_strip
    chip: ws2812
    type: custom
    version: default
    init_skip: true
    dependencies:
      espressif/led_strip:
        version: "^3.0"
        public: true
    config:
      max_leds: 1
    peripherals:
      - name: rmt_tx

  # On-board 1.14" ST7789V2 LCD (240x135, landscape).
  # The visible window starts at (40, 53) on the controller's 240x320 frame.
  # The offset is applied by the per-board panel factory in setup_device.c.
  - name: display_lcd
    chip: st7789
    type: display_lcd
    sub_type: spi
    version: default
    config:
      mirror_x: false
      mirror_y: true
      swap_xy: true
      invert_color: true
      x_max: 240
      y_max: 135
      io_spi_config:
        cs_gpio_num: 37
        dc_gpio_num: 34
        spi_mode: 0
        pclk_hz: 40000000
      lcd_panel_config:
        reset_gpio_num: 33
        data_endian: LCD_RGB_DATA_ENDIAN_BIG
        vendor_config: NULL
    peripherals:
      - name: spi_display

  # 56-key QWERTY matrix. Rows (R0..R7) are selected by a 74HC138 1-of-8
  # demultiplexer driven by KB_A0/A1/A2 (G8, G9, G11). Active row is held
  # low; the 7 column lines (G13, G15, G3, G4, G5, G6, G7) are read with
  # internal pull-ups — a pressed key reads 0. init_skip is set because no
  # built-in board-manager driver exists yet; the pins are recorded here
  # for the cardputer_kbd driver component to consume at runtime.
  - name: keyboard
    chip: hc138_matrix
    type: custom
    version: default
    init_skip: true
    config:
      rows: 8
      cols: 7
      row_select_gpios: [8, 9, 11]
      col_read_gpios: [13, 15, 3, 4, 5, 6, 7]
      active_row_level: 0
      col_pull_up: true
